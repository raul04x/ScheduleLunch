name: sch-lunch

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: schedule_lunch_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schedule_lunch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./schedule-lunch-back
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSQL: "Host=db;Port=5432;Database=schedule_lunch_db;Username=postgres;Password=${POSTGRES_PASSWORD:-Qwerty9876}"
      Jwt__Key: ${JWT_KEY:-a_very_secure_key}
      Cors__AllowedOrigins: "http://localhost,http://localhost:3000"
    ports:
      - "5133:8080"

  frontend:
    build:
      context: ./schedule-lunch-front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg_data:
